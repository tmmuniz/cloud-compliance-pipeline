frameworks:
  GDPR:
  - id: GDPR-H01
    control: S3_PUBLIC_BLOCK_ENABLED
    domain: Protection of Personal Data
    severity: HIGH
    score: 5
    requirement: Prevent public exposure of personal data stored in object storage.
  - id: GDPR-H02
    control: S3_ENCRYPTED
    domain: Protection of Personal Data
    severity: HIGH
    score: 5
    requirement: Encrypt personal data at rest.
  - id: GDPR-H03
    control: KMS_KEY_ROTATION_ENABLED
    domain: Cryptographic Protection
    severity: HIGH
    score: 5
    requirement: Rotate encryption keys used to protect regulated data.
  - id: GDPR-H04
    control: IAM_NO_ADMIN_POLICY
    domain: Access Control
    severity: HIGH
    score: 5
    requirement: Avoid excessive administrative access to personal data environments.
  - id: GDPR-H05
    control: CLOUDTRAIL_ENABLED
    domain: Accountability and Traceability
    severity: HIGH
    score: 5
    requirement: Maintain audit trails for access and administrative changes.
  - id: GDPR-H06
