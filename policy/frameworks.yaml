    severity: MEDIUM
    score: 3
    requirement: Use immutable storage where retention evidence is required.
  - id: GDPR-M08
    control: EC2_NO_PUBLIC_IP
    domain: Data Exposure Reduction
    severity: MEDIUM
    score: 3
    requirement: Avoid direct public exposure of compute processing personal data.
  - id: GDPR-M09
