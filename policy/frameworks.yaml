    domain: Security of Processing
    severity: HIGH
    score: 5
    requirement: Encrypt audit records that may contain personal data metadata.
  - id: GDPR-H08
    control: SECRETS_MANAGER_SECRET_ENCRYPTED
    domain: Credential Protection
    severity: HIGH
    score: 5
    requirement: Encrypt application secrets used to access personal data.
  - id: GDPR-H09
    control: SECRETS_MANAGER_ROTATION_ENABLED
    domain: Credential Lifecycle
    severity: HIGH
    score: 5
    requirement: Rotate secrets used by personal data processing systems.
  - id: GDPR-H10
    control: SECURITY_GROUP_NO_SSH_WORLD
    domain: Attack Surface Reduction
    severity: HIGH
    score: 5
    requirement: Prevent broad administrative access to personal data workloads.
  - id: GDPR-M01
    control: VPC_FLOW_LOGS_ENABLED
    domain: Monitoring
    severity: MEDIUM
    score: 3
    requirement: Log network activity related to personal data systems.
  - id: GDPR-M02
    control: CLOUDWATCH_LOG_RETENTION_90_DAYS
    domain: Accountability and Traceability
    severity: MEDIUM
    score: 3
    requirement: Retain operational logs for investigation and accountability.
