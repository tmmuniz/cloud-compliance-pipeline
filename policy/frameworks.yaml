    control: CLOUDWATCH_LOGS_ENCRYPTED
    domain: Security of Processing
    severity: MEDIUM
    score: 3
    requirement: Encrypt centralized operational logs.
  - id: GDPR-M04
    control: BACKUP_PLAN_EXISTS
    domain: Availability and Resilience
    severity: MEDIUM
    score: 3
    requirement: Define backup coverage for systems processing personal data.
  - id: GDPR-M05
    control: BACKUP_VAULT_ENCRYPTED
    domain: Availability and Resilience
    severity: MEDIUM
    score: 3
    requirement: Encrypt backup repositories containing personal data.
  - id: GDPR-M06
