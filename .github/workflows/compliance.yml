name: Cloud Compliance Pipeline

on:
  workflow_dispatch:
    inputs:
      FRAMEWORK:
        description: "Frameworks: ALL or GDPR,NIST_CSF,CIS,ISO27001,PCI_DSS,SOC2,MITRE,LGPD,BACEN"
        required: true
        default: "ALL"
      TFPLAN_JSON:
        description: "Terraform plan JSON content generated from AWS Terraform code"
        required: true
        default: "{}"

permissions:
  contents: read

jobs:
  compliance-audit:
    name: Compliance audit with OPA/Rego
    runs-on: ubuntu-latest

    env:
      FRAMEWORK: ${{ github.event.inputs.FRAMEWORK }}
      TFPLAN_JSON: ${{ github.event.inputs.TFPLAN_JSON }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa
          opa version

      - name: Create tfplan.json from GitHub Actions input
        run: |
          python scripts/write_tfplan_from_env.py             --env-var TFPLAN_JSON             --output tfplan.json

      - name: Validate tfplan.json
        run: python -m json.tool tfplan.json > /dev/null

      - name: Run compliance evaluation
        run: |
          python scripts/evaluate.py             --plan tfplan.json             --controls policy/controls.yaml             --rego policy/compliance.rego             --framework "$FRAMEWORK"             --output reports/results.json

      - name: Generate HTML report
        run: |
          python scripts/render_html.py             --input reports/results.json             --output reports/compliance-report.html

      - name: Upload compliance report
        uses: actions/upload-artifact@v4
        with:
          name: compliance-report
          path: |
            reports/compliance-report.html
            reports/results.json
            tfplan.json
