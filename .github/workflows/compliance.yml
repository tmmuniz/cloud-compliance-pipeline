name: Cloud Compliance Pipeline

on:
  workflow_dispatch:
    inputs:
      FRAMEWORK:
        description: "Framework to run: ALL, GDPR, NIST_CSF, CIS, ISO27001, PCI_DSS, SOC2, MITRE, LGPD, BACEN, OPEN_FINANCE"
        required: true
        default: "ALL"
        type: string
      AWS_REGION:
        description: "AWS region used only to render the Terraform plan"
        required: true
        default: "us-east-1"
        type: string

permissions:
  contents: read

env:
  FRAMEWORK: ${{ github.event.inputs.FRAMEWORK }}

jobs:
  audit_gdpr:
    name: GDPR Compliance Audit
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.FRAMEWORK == 'ALL' || contains(github.event.inputs.FRAMEWORK, 'GDPR') }}

    env:
      AWS_ACCESS_KEY_ID: mock_access_key
      AWS_SECRET_ACCESS_KEY: mock_secret_key
      AWS_REGION: ${{ github.event.inputs.AWS_REGION }}
      TF_VAR_AWS_REGION: ${{ github.event.inputs.AWS_REGION }}
      TF_IN_AUTOMATION: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Setup OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa
          opa version

      - name: Terraform init without remote backend
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Generate Terraform plan JSON locally in runner
        working-directory: terraform
        run: |
          terraform plan -refresh=false -out=tfplan
          terraform show -json tfplan > ../tfplan.json

      - name: Run GDPR OPA compliance evaluation
        run: |
          mkdir -p reports
          python3 scripts/evaluate.py \
            --plan tfplan.json \
            --controls policy/controls.yaml \
            --framework "GDPR" \
            --output reports/results-gdpr.json

      - name: Generate GDPR HTML compliance report
        run: |
          python3 scripts/render_html.py \
            --input reports/results-gdpr.json \
            --output reports/compliance-report-gdpr.html

      - name: Remove sensitive Terraform plan files
        if: always()
        run: |
          rm -f terraform/tfplan tfplan.json terraform/tfplan.json

      - name: Upload GDPR HTML report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloud-compliance-report-gdpr
          path: reports/compliance-report-gdpr.html
          if-no-files-found: ignore
